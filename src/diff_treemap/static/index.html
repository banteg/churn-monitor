<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Diff Treemap</title>
    <link rel="stylesheet" href="/static/app.css">
    <script>
      window.DIFF_TREEMAP_CONFIG = __APP_CONFIG__;
    </script>
    <script src="/plotly.min.js"></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Diff Treemap</p>
          <h1>Current branch vs base</h1>
        </div>
        <div id="status-pill" class="status-pill">Loading</div>
      </header>

      <section class="summary-grid">
        <article class="metric-card">
          <span>Changed files</span>
          <strong id="changed-files">0</strong>
        </article>
        <article class="metric-card">
          <span>Added lines</span>
          <strong id="added-lines">0</strong>
        </article>
        <article class="metric-card">
          <span>Deleted lines</span>
          <strong id="deleted-lines">0</strong>
        </article>
        <article class="metric-card">
          <span>Net lines</span>
          <strong id="net-lines">0</strong>
        </article>
      </section>

      <section class="info-bar">
        <div>
          <span class="label">Repo</span>
          <span id="repo-root">-</span>
        </div>
        <div>
          <span class="label">Branch</span>
          <span id="head-ref">-</span>
        </div>
        <div>
          <span class="label">Base</span>
          <span id="base-ref">-</span>
        </div>
        <div>
          <span class="label">Merge base</span>
          <span id="merge-base">-</span>
        </div>
        <div>
          <span class="label">Updated</span>
          <span id="generated-at">-</span>
        </div>
      </section>

      <section class="content-grid">
        <article class="panel treemap-panel">
          <div class="panel-header">
            <div>
              <p class="panel-title">Treemap</p>
              <p class="panel-subtitle">Area = churn, color = net delta</p>
            </div>
          </div>
          <div id="treemap" class="treemap"></div>
        </article>

        <aside class="side-stack">
          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="panel-title">Top Additions</p>
                <p class="panel-subtitle">Files with the biggest net increase</p>
              </div>
            </div>
            <ol id="top-additions" class="change-list"></ol>
          </article>

          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="panel-title">Top Cuts</p>
                <p class="panel-subtitle">Files with the biggest net decrease</p>
              </div>
            </div>
            <ol id="top-deletions" class="change-list"></ol>
          </article>
        </aside>
      </section>
    </div>
  </body>
</html>
