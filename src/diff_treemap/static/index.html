<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Diff Treemap</title>
    <link rel="stylesheet" href="/static/app.css">
    <script>
      window.DIFF_TREEMAP_CONFIG = __APP_CONFIG__;
    </script>
    <script src="/plotly.min.js"></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <section class="topbar repo-strip">
        <div class="info-item repo-item">
          <span class="label">Repo</span>
          <strong id="repo-root">-</strong>
        </div>
        <div class="status-group">
          <span id="last-edit" class="last-edit">-</span>
          <div id="status-pill" class="status-pill">Loading</div>
        </div>
      </section>

      <header class="topbar summary-bar">
        <section class="summary-strip" aria-label="Diff summary">
          <div class="summary-item neutral">
            <span>Changed files</span>
            <strong id="changed-files">0</strong>
          </div>
          <div class="summary-item neutral">
            <span>Commits</span>
            <strong id="commit-count">0</strong>
          </div>
          <div class="summary-item positive">
            <span>Added lines</span>
            <strong id="added-lines">0</strong>
          </div>
          <div class="summary-item negative">
            <span>Deleted lines</span>
            <strong id="deleted-lines">0</strong>
          </div>
          <div class="summary-item">
            <span>Net lines</span>
            <strong id="net-lines">0</strong>
          </div>
        </section>
      </header>

      <section class="topbar info-strip">
        <div class="info-item">
          <span class="label">Branch</span>
          <strong id="head-ref">-</strong>
        </div>
        <div class="info-item">
          <span class="label">Base</span>
          <strong id="base-ref">-</strong>
        </div>
      </section>

      <section class="content-grid">
        <article class="panel treemap-panel">
          <div class="panel-header">
            <p class="panel-title">Treemap</p>
          </div>
          <div id="treemap" class="treemap"></div>
        </article>

        <aside class="side-stack">
          <article class="panel">
            <div class="panel-header">
              <p class="panel-title">Commits</p>
            </div>
            <ol id="commit-list" class="commit-list"></ol>
          </article>

          <article class="panel">
            <div class="panel-header">
              <p class="panel-title">Top Additions</p>
            </div>
            <ol id="top-additions" class="change-list"></ol>
          </article>

          <article class="panel">
            <div class="panel-header">
              <p class="panel-title">Top Cuts</p>
            </div>
            <ol id="top-deletions" class="change-list"></ol>
          </article>
        </aside>
      </section>
    </div>
  </body>
</html>
